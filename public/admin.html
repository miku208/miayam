<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Minecraft Server</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #fff; }
        
        /* Login Page */
        .login-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0a0e1a, #1a1f2e); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .login-card { background: rgba(30,34,48,0.95); backdrop-filter: blur(10px); border-radius: 24px; padding: 40px; text-align: center; border: 1px solid rgba(88,101,242,0.3); max-width: 400px; width: 90%; }
        .login-logo-img { width: 80px; height: 80px; margin-bottom: 20px; }
        .login-card h2 { font-size: 28px; background: linear-gradient(135deg, #5865f2, #7289da); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #5865f2; }
        .input-group input { width: 100%; padding: 14px 16px 14px 48px; background: #2a2e3d; border: 1px solid #3a3e4d; border-radius: 12px; color: white; font-size: 16px; }
        .login-btn { background: linear-gradient(135deg, #5865f2, #4752c4); border: none; padding: 14px; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        
        /* Dashboard */
        .admin-container { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background: #1e2230; padding: 2rem 0; position: fixed; height: 100vh; overflow-y: auto; border-right: 1px solid rgba(88,101,242,0.2); }
        .admin-logo { text-align: center; font-size: 1.5rem; font-weight: bold; color: #5865f2; padding-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; }
        .admin-nav-item { background: transparent; border: none; color: #b9bbbe; padding: 12px 20px; width: 100%; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .admin-nav-item.active, .admin-nav-item:hover { background: rgba(88,101,242,0.2); color: #5865f2; border-left: 3px solid #5865f2; }
        .logout-btn { background: rgba(237,66,69,0.2); border: 1px solid rgba(237,66,69,0.3); padding: 12px; border-radius: 10px; color: #ed4245; cursor: pointer; width: calc(100% - 40px); margin: 20px; }
        
        .admin-main { margin-left: 260px; padding: 2rem; width: calc(100% - 260px); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .admin-form { background: #1e2230; padding: 2rem; border-radius: 16px; max-width: 800px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #b9bbbe; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; background: #2a2e3d; border: 1px solid #3a3e4d; border-radius: 8px; color: white; }
        .btn-primary { background: linear-gradient(135deg, #5865f2, #4752c4); border: none; padding: 12px 24px; border-radius: 8px; color: white; cursor: pointer; }
        
        .rank-actions-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .action-btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .action-btn.primary { background: #5865f2; color: white; }
        .action-btn.danger { background: #ed4245; color: white; }
        .action-btn.warning { background: #faa81a; color: #1e2230; }
        
        .ranks-table { width: 100%; background: #1e2230; border-collapse: collapse; }
        .ranks-table th, .ranks-table td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2e3d; }
        .ranks-table th { background: #2a2e3d; color: #5865f2; }
        .edit-btn, .delete-btn { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; margin: 0 3px; }
        .edit-btn { background: #faa81a; color: #1e2230; }
        .delete-btn { background: #ed4245; color: white; }
        
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #1e2230; margin: 10% auto; padding: 2rem; border-radius: 16px; max-width: 500px; }
        .close-modal { float: right; font-size: 28px; cursor: pointer; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #5865f2; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity 0.3s; z-index: 2000; }
        .toast.show { opacity: 1; }
        
        @media (max-width: 768px) { .admin-sidebar { width: 70px; } .admin-sidebar span { display: none; } .admin-main { margin-left: 70px; width: calc(100% - 70px); } }
    </style>
</head>
<body>
    <div id="login-page" class="login-page">
        <div class="login-card">
            <img src="assets/images/logo.png" alt="Logo" class="login-logo-img" onerror="this.style.display='none'">
            <h2>Admin Panel</h2>
            <p style="margin: 10px 0 30px; color:#b9bbbe">Login to manage your server</p>
            <input type="text" id="login-username" placeholder="Username" style="width:100%; padding:12px; margin-bottom:15px; background:#2a2e3d; border:1px solid #3a3e4d; border-radius:8px; color:white;">
            <input type="password" id="login-password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:20px; background:#2a2e3d; border:1px solid #3a3e4d; border-radius:8px; color:white;">
            <button class="login-btn" id="login-btn">Login</button>
        </div>
    </div>

    <div id="dashboard-page" style="display:none">
        <div class="admin-container">
            <div class="admin-sidebar">
                <div class="admin-logo"><i class="fas fa-cube"></i> <span>Admin</span></div>
                <button class="admin-nav-item active" data-tab="settings"><i class="fas fa-cog"></i> <span>Settings</span></button>
                <button class="admin-nav-item" data-tab="ranks"><i class="fas fa-crown"></i> <span>Ranks</span></button>
                <button class="logout-btn" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
            <div class="admin-main">
                <div class="admin-header"><h1 id="page-title">Settings</h1></div>
                <div id="tab-settings" class="admin-tab">
                    <form id="settings-form" class="admin-form">
                        <div class="form-group"><label>Server Name</label><input type="text" id="set-server-name"></div>
                        <div class="form-group"><label>Tagline</label><input type="text" id="set-tagline"></div>
                        <div class="form-group"><label>IP Address</label><input type="text" id="set-ip"></div>
                        <div class="form-group"><label>Port</label><input type="text" id="set-port"></div>
                        <div class="form-group"><label>WhatsApp Link</label><input type="url" id="set-wa-link"></div>
                        <div class="form-group"><label>Discord Link</label><input type="url" id="set-discord-link"></div>
                        <div class="form-group"><label>TikTok Link</label><input type="url" id="set-tiktok-link"></div>
                        <button type="submit" class="btn-primary">Save Settings</button>
                    </form>
                </div>
                <div id="tab-ranks" class="admin-tab" style="display:none">
                    <div class="rank-actions-bar">
                        <button class="action-btn primary" id="add-rank-btn">+ Add Rank</button>
                        <button class="action-btn danger" id="delete-all-ranks-btn">Delete All</button>
                    </div>
                    <table class="ranks-table">
                        <thead><tr><th>Name</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
                        <tbody id="ranks-table-body"><tr><td colspan="4">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="rank-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modal-title">Add Rank</h3>
            <form id="rank-form">
                <input type="hidden" id="rank-id">
                <div class="form-group"><label>Rank Name</label><input type="text" id="rank-name" required></div>
                <div class="form-group"><label>Price</label><input type="number" id="rank-price" required></div>
                <div class="form-group"><label>Description</label><textarea id="rank-description" rows="2"></textarea></div>
                <div class="form-group"><label>Benefits</label><input type="text" id="rank-benefits"></div>
                <div class="form-group"><label><input type="checkbox" id="rank-active" checked> Active</label></div>
                <button type="submit" class="btn-primary">Save</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let sessionToken = null;
        let currentRanks = [];

        // Auth
        document.getElementById('login-btn').onclick = async () => {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                sessionToken = data.token;
                localStorage.setItem('admin_token', sessionToken);
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('dashboard-page').style.display = 'block';
                loadSettings();
                loadRanks();
            } else { alert('Login failed'); }
        };

        document.getElementById('logout-btn').onclick = () => {
            sessionToken = null;
            localStorage.removeItem('admin_token');
            document.getElementById('login-page').style.display = 'flex';
            document.getElementById('dashboard-page').style.display = 'none';
        };

        function getHeaders() { return { 'Content-Type': 'application/json', 'X-Session-Token': sessionToken }; }

        async function loadSettings() {
            const res = await fetch('/api/settings');
            const s = await res.json();
            document.getElementById('set-server-name').value = s.server_name || '';
            document.getElementById('set-tagline').value = s.tagline || '';
            document.getElementById('set-ip').value = s.ip || '';
            document.getElementById('set-port').value = s.port || '';
            document.getElementById('set-wa-link').value = s.wa_link || '';
            document.getElementById('set-discord-link').value = s.discord_link || '';
            document.getElementById('set-tiktok-link').value = s.tiktok_link || '';
        }

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            await fetch('/api/settings', {
                method: 'POST', headers: getHeaders(),
                body: JSON.stringify({
                    server_name: document.getElementById('set-server-name').value,
                    tagline: document.getElementById('set-tagline').value,
                    ip: document.getElementById('set-ip').value,
                    port: document.getElementById('set-port').value,
                    wa_link: document.getElementById('set-wa-link').value,
                    discord_link: document.getElementById('set-discord-link').value,
                    tiktok_link: document.getElementById('set-tiktok-link').value
                })
            });
            showToast('Settings saved!');
        };

        async function loadRanks() {
            const res = await fetch('/api/ranks');
            currentRanks = await res.json();
            const tbody = document.getElementById('ranks-table-body');
            tbody.innerHTML = currentRanks.map(r => `
                <tr>
                    <td>${r.name}</td>
                    <td>Rp ${r.price.toLocaleString()}</td>
                    <td>${r.is_active ? 'Active' : 'Inactive'}</td>
                    <td><button class="edit-btn" onclick="editRank(${r.id})">Edit</button><button class="delete-btn" onclick="deleteRank(${r.id})">Delete</button></td>
                </tr>
            `).join('');
        }

        window.editRank = (id) => {
            const rank = currentRanks.find(r => r.id === id);
            document.getElementById('rank-id').value = rank.id;
            document.getElementById('rank-name').value = rank.name;
            document.getElementById('rank-price').value = rank.price;
            document.getElementById('rank-description').value = rank.description || '';
            document.getElementById('rank-benefits').value = rank.benefits || '';
            document.getElementById('rank-active').checked = rank.is_active;
            document.getElementById('modal-title').innerText = 'Edit Rank';
            document.getElementById('rank-modal').style.display = 'block';
        };

        window.deleteRank = async (id) => {
            if (!confirm('Delete this rank?')) return;
            await fetch(`/api/ranks/${id}`, { method: 'DELETE', headers: getHeaders() });
            loadRanks();
            showToast('Rank deleted');
        };

        document.getElementById('add-rank-btn').onclick = () => {
            document.getElementById('rank-form').reset();
            document.getElementById('rank-id').value = '';
            document.getElementById('modal-title').innerText = 'Add Rank';
            document.getElementById('rank-modal').style.display = 'block';
        };

        document.getElementById('delete-all-ranks-btn').onclick = async () => {
            if (!confirm('Delete ALL ranks?')) return;
            await fetch('/api/ranks', { method: 'DELETE', headers: getHeaders() });
            loadRanks();
            showToast('All ranks deleted');
        };

        document.getElementById('rank-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('rank-id').value;
            const data = {
                name: document.getElementById('rank-name').value,
                price: parseInt(document.getElementById('rank-price').value),
                description: document.getElementById('rank-description').value,
                benefits: document.getElementById('rank-benefits').value,
                is_active: document.getElementById('rank-active').checked
            };
            const url = id ? `/api/ranks/${id}` : '/api/ranks';
            const method = id ? 'PUT' : 'POST';
            await fetch(url, { method, headers: getHeaders(), body: JSON.stringify(data) });
            document.getElementById('rank-modal').style.display = 'none';
            loadRanks();
            showToast(id ? 'Rank updated' : 'Rank added');
        };

        document.querySelector('.close-modal').onclick = () => document.getElementById('rank-modal').style.display = 'none';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.querySelectorAll('.admin-nav-item').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tab = btn.dataset.tab;
                document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
                document.getElementById(`tab-${tab}`).style.display = 'block';
                document.getElementById('page-title').innerText = btn.innerText.trim();
            };
        });

        const token = localStorage.getItem('admin_token');
        if (token) { sessionToken = token; document.getElementById('login-page').style.display = 'none'; document.getElementById('dashboard-page').style.display = 'block'; loadSettings(); loadRanks(); }
    </script>
</body>
</html>
